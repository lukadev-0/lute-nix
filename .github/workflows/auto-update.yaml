name: Auto update

on:
  workflow_dispatch:
  schedule:
    # Run every day at 2:00 UTC
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: auto-update

jobs:
  update:
    name: Update
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.AUTO_UPDATE_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.AUTO_UPDATE_TOKEN }}
          extra_nix_config: |
            substituters = https://cache.nixos.org https://cache.garnix.io
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Perform auto update
        id: update
        env:
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: |
          nix develop -c update-script

          version="$(nix eval --raw .#lute.version)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit update
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: "lute: ${{ steps.update.outputs.version }}"
          push: false

      - name: Update flake inputs
        run: nix flake update

      - name: Commit flake update
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: "chore: update flake"
          push: false

      - name: Push
        run: git push origin HEAD:auto-update --force
